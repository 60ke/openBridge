<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenBridge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 350px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 13px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #e0e0e0;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #e74c3c;
      transition: background 0.3s;
    }
    .status-dot.connected {
      background: #2ecc71;
    }
    .section {
      padding: 12px 16px;
      border-bottom: 1px solid #0f3460;
    }
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #7f8c8d;
      margin-bottom: 8px;
    }
    .connection-status .url {
      color: #3498db;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
    }
    .connection-status .disconnected-text {
      color: #e74c3c;
    }
    .pairing-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .paired-text {
      color: #2ecc71;
    }
    .not-paired-text {
      color: #e74c3c;
    }
    .btn {
      padding: 4px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: background 0.2s;
    }
    .btn-primary {
      background: #3498db;
      color: white;
    }
    .btn-primary:hover {
      background: #2980b9;
    }
    .btn-danger {
      background: #c0392b;
      color: white;
    }
    .btn-danger:hover {
      background: #a93226;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
    }
    .toggle-row + .toggle-row {
      margin-top: 8px;
      padding-top: 14px;
      border-top: 1px solid #0f3460;
    }
    .toggle-label {
      font-size: 13px;
      flex: 1;
      margin-right: 12px;
    }
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
      cursor: pointer;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #34495e;
      border-radius: 22px;
      transition: background 0.3s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s;
    }
    .toggle input:checked + .slider {
      background: #3498db;
    }
    .toggle input:checked + .slider::before {
      transform: translateX(18px);
    }
    .activity-list {
      max-height: 120px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #0f3460 transparent;
    }
    .activity-list::-webkit-scrollbar {
      width: 4px;
    }
    .activity-list::-webkit-scrollbar-thumb {
      background: #0f3460;
      border-radius: 2px;
    }
    .activity-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      font-size: 12px;
    }
    .activity-item .name {
      color: #3498db;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .activity-item .time {
      color: #7f8c8d;
      font-size: 11px;
    }
    .activity-empty {
      color: #7f8c8d;
      font-style: italic;
      font-size: 12px;
    }
    .footer {
      padding: 8px 16px;
      text-align: center;
      font-size: 11px;
      color: #7f8c8d;
    }
  </style>
  <script type="module" crossorigin src="/chunks/popup-EeK6f6T1.js"></script>
</head>
<body>
  <div class="header">
    <h1>OpenBridge</h1>
    <div class="status-dot" id="statusDot"></div>
  </div>

  <div class="section">
    <div class="section-title">Connection</div>
    <div class="connection-status" id="connectionStatus">
      <span class="disconnected-text">Disconnected</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Pairing</div>
    <div class="pairing-info" id="pairingInfo">
      <span class="not-paired-text">Pairing Required</span>
      <button class="btn btn-primary" id="pairBtn">Pair</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Permissions</div>
    <div class="toggle-row">
      <span class="toggle-label">Allow JavaScript Execution (browser_evaluate)</span>
      <label class="toggle">
        <input type="checkbox" id="evaluateToggle">
        <span class="slider"></span>
      </label>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Pause AI Control</span>
      <label class="toggle">
        <input type="checkbox" id="pauseToggle">
        <span class="slider"></span>
      </label>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Visual Cursor</span>
      <label class="toggle">
        <input type="checkbox" id="cursorToggle">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Recent Activity</div>
    <div class="activity-list" id="activityList">
      <div class="activity-empty">No recent activity</div>
    </div>
  </div>

  <div class="footer" id="footer">v0.1.0</div>

</body>
</html>
