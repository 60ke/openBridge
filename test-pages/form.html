<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Testing — OpenBridge</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; color: #333; max-width: 800px; margin: 0 auto; padding: 40px 20px; line-height: 1.6; }
header { margin-bottom: 32px; }
header h1 { margin-bottom: 4px; color: #1a1a2e; }
header a { color: #4a6cf7; text-decoration: none; font-size: 0.9em; }
header a:hover { text-decoration: underline; }
form { background: #fff; padding: 24px; border-radius: 8px; border: 1px solid #e0e0e0; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-weight: 600; margin-bottom: 6px; color: #1a1a2e; }
.form-group input[type="text"],
.form-group input[type="email"],
.form-group input[type="password"],
.form-group textarea,
.form-group select { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 1em; font-family: inherit; }
.form-group textarea { resize: vertical; min-height: 100px; }
.form-group input[type="text"]:focus,
.form-group input[type="email"]:focus,
.form-group input[type="password"]:focus,
.form-group textarea:focus,
.form-group select:focus { outline: none; border-color: #4a6cf7; box-shadow: 0 0 0 3px rgba(74, 108, 247, 0.15); }
.checkbox-group, .radio-group { display: flex; flex-direction: column; gap: 8px; }
.checkbox-group label, .radio-group label { display: flex; align-items: center; gap: 8px; font-weight: 400; cursor: pointer; }
.checkbox-group input, .radio-group input { width: 18px; height: 18px; cursor: pointer; }
button[type="submit"] { padding: 12px 32px; background: #4a6cf7; color: #fff; border: none; border-radius: 6px; font-size: 1em; font-weight: 600; cursor: pointer; transition: background 0.2s; }
button[type="submit"]:hover { background: #3a5ce5; }
#success-message { display: none; margin-top: 20px; padding: 16px; background: #d4edda; color: #155724; border: 1px solid #c3e6cb; border-radius: 6px; font-weight: 600; }
</style>
</head>
<body>
<header>
<h1>Form Testing</h1>
<a href="index.html">&larr; Back to Index</a>
</header>
<form id="test-form">
<div class="form-group">
<label for="name">Name</label>
<input type="text" id="name" name="name" placeholder="Enter your name">
</div>
<div class="form-group">
<label for="email">Email</label>
<input type="email" id="email" name="email" placeholder="Enter your email">
</div>
<div class="form-group">
<label for="password">Password</label>
<input type="password" id="password" name="password" placeholder="Enter your password">
</div>
<div class="form-group">
<label for="message">Message</label>
<textarea id="message" name="message" placeholder="Enter your message"></textarea>
</div>
<div class="form-group">
<label for="category">Category</label>
<select id="category" name="category">
<option value="">Select a category</option>
<option value="general">General</option>
<option value="support">Support</option>
<option value="feedback">Feedback</option>
<option value="bug">Bug Report</option>
</select>
</div>
<div class="form-group">
<label>Preferences</label>
<div class="checkbox-group">
<label><input type="checkbox" id="newsletter" name="newsletter"> Subscribe to newsletter</label>
<label><input type="checkbox" id="terms" name="terms"> Accept terms and conditions</label>
<label><input type="checkbox" id="updates" name="updates"> Receive product updates</label>
</div>
</div>
<div class="form-group">
<label>Priority</label>
<div class="radio-group">
<label><input type="radio" id="priority-low" name="priority" value="low"> Low</label>
<label><input type="radio" id="priority-medium" name="priority" value="medium"> Medium</label>
<label><input type="radio" id="priority-high" name="priority" value="high"> High</label>
</div>
</div>
<button type="submit" id="submit-btn">Submit Form</button>
</form>
<div id="success-message">Form submitted successfully!</div>
<script>
document.getElementById('test-form').addEventListener('submit', function(e) {
e.preventDefault();
document.getElementById('success-message').style.display = 'block';
});
</script>
</body>
</html>
